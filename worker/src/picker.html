<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>JobFit — Pick Resume from Drive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f7fa;
      color: #333;
    }
    h1 { font-size: 16px; margin: 0 0 12px; color: #1a73e8; }
    #status { font-size: 13px; line-height: 1.5; }
    #status.error { color: #c62828; }
    .hint { font-size: 11px; color: #888; margin-top: 12px; }
    #progress-wrap { display: none; margin-top: 16px; }
    #progress-track { background: #e0e0e0; border-radius: 4px; height: 8px; overflow: hidden; }
    #progress-fill { background: #1a73e8; height: 100%; width: 0%; transition: width 0.25s ease; }
    #progress-label { font-size: 11px; color: #555; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>JobFit — pick a resume PDF from your Google Drive</h1>
  <div id="status">Connecting to extension…</div>
  <div id="progress-wrap">
    <div id="progress-track"><div id="progress-fill"></div></div>
    <div id="progress-label"></div>
  </div>
  <div class="hint">If the picker does not open, close this window and try again from the JobFit popup.</div>

  <script src="https://apis.google.com/js/api.js"></script>
  <script>
    (function () {
      var statusEl = document.getElementById('status');
      var progressWrap = document.getElementById('progress-wrap');
      var progressFill = document.getElementById('progress-fill');
      var progressLabel = document.getElementById('progress-label');

      function setStatus(msg, isError) {
        statusEl.textContent = msg;
        statusEl.className = isError ? 'error' : '';
      }

      function setProgress(done, total, fileName) {
        progressWrap.style.display = 'block';
        progressFill.style.width = (total > 0 ? Math.round(done / total * 100) : 0) + '%';
        progressLabel.textContent = fileName
          ? 'File ' + done + ' of ' + total + ': ' + fileName
          : (done === total ? 'All files downloaded.' : '');
      }

      function getExtId() {
        return new URLSearchParams(window.location.search).get('extId');
      }

      function send(extId, msg) {
        return new Promise(function (resolve) {
          try {
            if (!window.chrome || !chrome.runtime || !chrome.runtime.sendMessage) {
              resolve({ ok: false, error: 'chrome.runtime not available — open this from the JobFit extension' });
              return;
            }
            chrome.runtime.sendMessage(extId, msg, function (response) {
              if (chrome.runtime.lastError) {
                resolve({ ok: false, error: chrome.runtime.lastError.message || 'sendMessage failed' });
              } else {
                resolve({ ok: true, response: response });
              }
            });
          } catch (err) {
            resolve({ ok: false, error: String(err && err.message ? err.message : err) });
          }
        });
      }

      async function notifyError(extId, message) {
        await send(extId, { type: 'pickerError', error: message });
      }

      async function start() {
        var extId = getExtId();
        if (!extId) {
          setStatus('Missing extId param. Open this page from the JobFit extension, not directly.', true);
          return;
        }
        setStatus('Requesting auth token from extension…');
        var tokenResult = await send(extId, { type: 'requestToken' });
        if (!tokenResult.ok || !tokenResult.response || !tokenResult.response.token) {
          var msg = 'Could not get auth token: ' + (tokenResult.error || 'extension did not respond');
          setStatus(msg, true);
          await notifyError(extId, msg);
          return;
        }
        var token = tokenResult.response.token;

        setStatus('Loading Google Drive picker…');
        gapi.load('picker', { callback: function () { buildPicker(extId, token); } });
      }

      function buildPicker(extId, token) {
        try {
          var view = new google.picker.DocsView()
            .setIncludeFolders(true)
            .setSelectFolderEnabled(false)
            .setMimeTypes('application/pdf');

          var picker = new google.picker.PickerBuilder()
            .setOAuthToken(token)
            .addView(view)
            .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
            .setCallback(function (data) { onPickerCallback(extId, token, data); })
            .build();

          picker.setVisible(true);
          setStatus('Pick a PDF resume to continue.');
        } catch (err) {
          var msg = 'Failed to build picker: ' + (err && err.message ? err.message : String(err));
          setStatus(msg, true);
          notifyError(extId, msg);
        }
      }

      async function onPickerCallback(extId, token, data) {
        if (data.action === google.picker.Action.PICKED) {
          var docs = data.docs || [];
          if (!docs.length) {
            await notifyError(extId, 'Picker returned no documents');
            window.close();
            return;
          }
          setStatus('Downloading…');
          setProgress(0, docs.length, '');
          var done = 0;
          var filesOrError;
          try {
            filesOrError = await Promise.all(docs.map(async function(doc) {
              var res = await fetch(
                'https://www.googleapis.com/drive/v3/files/' + doc.id + '?alt=media',
                { headers: { Authorization: 'Bearer ' + token } }
              );
              if (!res.ok) {
                var errText = await res.text().catch(function() { return ''; });
                throw new Error(doc.name + ': download failed (' + res.status + '): ' + errText.slice(0, 200));
              }
              var buf = await res.arrayBuffer();
              var bytes = new Uint8Array(buf);
              var binary = '', CHUNK = 8192;
              for (var b = 0; b < bytes.byteLength; b += CHUNK)
                binary += String.fromCharCode.apply(null, bytes.subarray(b, b + CHUNK));
              done++;
              setProgress(done, docs.length, done < docs.length ? '' : '');
              return { fileId: doc.id, fileName: doc.name, contentBase64: btoa(binary) };
            }));
          } catch (err) {
            await notifyError(extId, err.message || String(err));
            window.close();
            return;
          }
          var files = filesOrError;
          setStatus('Sending to extension…');
          await send(extId, { type: 'filesPicked', files: files });
          setStatus('Done. Closing…');
          setTimeout(function () { window.close(); }, 200);
        } else if (data.action === google.picker.Action.CANCEL) {
          await send(extId, { type: 'pickerCancelled' });
          window.close();
        }
      }

      start();
    })();
  </script>
</body>
</html>
