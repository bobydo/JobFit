name = "jobfit-signup"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# Fill in account_id from Cloudflare dashboard → right-side panel → Account ID
# (Optional if your wrangler login has access to only one account.)
# account_id = "..."

# Bindings
[[kv_namespaces]]
binding = "SIGNUPS"
id = "55b9809c9a724f1a9aa850059f056605"

[[kv_namespaces]]
binding = "SUBSCRIPTIONS"
id = "0d55b4cbce5e45c094d4208184ba6e73"

# Configurable limits — change here, redeploy, no code edit needed
# ⚠ Keep in sync with DAILY_ANALYSIS_LIMIT in src/config.ts
[vars]
DAILY_LIMIT = 120

[[d1_databases]]
binding       = "DB"
database_name = "jobfit-history"
database_id   = "c2ad2ad0-0357-47ca-bec5-1af2b1333659"

# Secrets — set via: npx wrangler secret put <NAME>
# STRIPE_WEBHOOK_SECRET   — from Stripe dashboard → Webhooks → Signing secret
# OPENAI_API_KEY          — your GPT-4o mini key
# RESEND_API_KEY          — from resend.com (free: 3,000 emails/month)

# Note: Wrangler's default rules already treat *.html as Text modules,
# so `import pickerHtml from './picker.html'` works out of the box.
